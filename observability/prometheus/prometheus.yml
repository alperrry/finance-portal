global:
  scrape_interval: 15s
  evaluation_interval: 15s

otlp:
  promote_resource_attributes:
    - service.name
    - service.namespace
    - service.instance.id
    - deployment.environment

storage:
  tsdb:
    out_of_order_time_window: 30m

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]