spring.application.name=backend-test

# PostgreSQL Testcontainers URL @DynamicPropertySource ile set edilir.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=filesystem:../db/migrations

spring.task.scheduling.enabled=false
app.startup-tasks.enabled=false

spring.autoconfigure.exclude=\
  org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration,\
  org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration
spring.cache.type=none

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:0/dummy-jwks

test.mock.server.port=18080
stock.quote-url=http://localhost:${test.mock.server.port}/v7/finance/quote?symbols=%s
stock.history-url=http://localhost:${test.mock.server.port}/v8/finance/chart/%s?interval=1d&range=1y
yahoo.consent-url=http://localhost:${test.mock.server.port}/fc
yahoo.crumb-url=http://localhost:${test.mock.server.port}/v1/test/getcrumb
http.client.connect-timeout-seconds=1
http.client.read-timeout-seconds=1
http.client.write-timeout-seconds=1

tcmb.url=http://localhost:${test.mock.server.port}/dummy/tcmb
tcmb.archive-url=http://localhost:${test.mock.server.port}/dummy/tcmb/%s/%s.xml
fund.base-url=http://localhost:${test.mock.server.port}/dummy/tefas/
fund.home-url=http://localhost:${test.mock.server.port}/dummy/tefas/FonAnaliz.aspx
evds.base-url=http://localhost:${test.mock.server.port}/dummy/evds
evds.api-key=test-dummy-key
news.api.key=test-key
news.api.base-url=http://localhost:${test.mock.server.port}/dummy/news
groq.api.key=test-key

keycloak.realm=test-realm
keycloak.issuer-url=http://localhost:0
keycloak.internal-url=http://localhost:0
keycloak.admin.client-id=test-client
keycloak.admin.client-secret=test-secret

news.fetcher.enabled=false

logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.flywaydb=WARN
logging.level.com.alper.backend=WARN
