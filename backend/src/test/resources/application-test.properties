# ============================================
# TEST PROFILE — H2 in-memory, no external deps
# ============================================

spring.application.name=backend-test

# H2 in-memory DB, PostgreSQL compatibility mode
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA: schema'yı kendisi oluştursun (production: validate, test: create-drop)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway test'te kapalı (migration'lar ../db/migrations'da, classpath dışı)
spring.flyway.enabled=false

# Redis ve Cache test'te kapalı
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.cache.CacheAutoConfiguration
spring.cache.type=none

# Keycloak/JWT test'te kapalı (Keycloak henüz hazır değil)
# JWK set URI boşaltılırsa OAuth2 resource server kendini disable eder
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:0/dummy-jwks

# Scheduler'ları test'te kapat (cron'lar tetiklenmesin)
news.fetcher.enabled=false

# Dış servis URL'leri test'te dummy değerlerle - gerçek API çağrısı olmamalı
tcmb.url=http://localhost:0/dummy
tcmb.archive-url=http://localhost:0/dummy/%s/%s.xml
stock.quote-url=http://localhost:0/dummy?symbols=%s
stock.history-url=http://localhost:0/dummy/%s
fund.base-url=http://localhost:0/dummy/
evds.base-url=http://localhost:0/dummy
evds.api-key=test-dummy-key

# Keycloak admin dummy
keycloak.realm=test-realm
keycloak.issuer-url=http://localhost:0
keycloak.internal-url=http://localhost:0
keycloak.admin.client-id=test-client
keycloak.admin.client-secret=test-secret

# News API dummy
news.api.key=test-key
news.api.base-url=http://localhost:0/dummy
groq.api.key=test-key

# Logging
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.alper.backend=DEBUG
