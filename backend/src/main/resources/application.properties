spring.application.name=backend
spring.config.import=optional:file:./.env[.properties],optional:file:./backend/.env[.properties]
# Datasource configuration (overridden by env vars in docker-compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:finance_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:finance_pass}
spring.jpa.open-in-view=false

# HikariCP — 200 VU için yeterli bağlantı havuzu (varsayılan 10 yetersiz)
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# HTTP gzip sıkıştırma
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

news.api.key=${NEWS_API_KEY:}
news.api.base-url=${NEWS_API_BASE_URL:https://newsapi.org/v2}
news.api.country=${NEWS_API_COUNTRY:tr}
news.api.category=${NEWS_API_CATEGORY:business}
groq.api.key=${GROQ_API_KEY:}
groq.api.model=${GROQ_API_MODEL:llama-3.3-70b-versatile}
groq.api.timeout=${GROQ_API_TIMEOUT:30}


# Flyway configuration
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=${SPRING_FLYWAY_LOCATIONS:filesystem:../db/migrations}

# Hibernate schema validation
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
app.startup-tasks.enabled=${APP_STARTUP_TASKS_ENABLED:true}

springdoc.swagger-ui.enabled=true



# News Fetcher Scheduler Configuration
news.fetcher.enabled=${NEWS_FETCHER_ENABLED:true\}
news.fetcher.fixed-delay=${NEWS_FETCHER_FIXED_DELAY:300000}
news.fetcher.initial-delay=${NEWS_FETCHER_INITIAL_DELAY:60000}
news.fetcher.ai-max-calls-per-run=${NEWS_FETCHER_AI_MAX_CALLS_PER_RUN:30}
news.fetcher.filter-non-finance=${NEWS_FETCHER_FILTER_NON_FINANCE:true}

# Redis Configuration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false
spring.cache.type=redis

# TCMB Configuration
tcmb.url=${TCMB_URL:https://www.tcmb.gov.tr/kurlar/today.xml}
tcmb.cron=${TCMB_CRON:0 5 2 * * MON-SAT}
tcmb.retention-days=${TCMB_RETENTION_DAYS:365}
tcmb.archive-url=${TCMB_ARCHIVE_URL:https://www.tcmb.gov.tr/kurlar/%s/%s.xml}
# Stock Configuration
stock.quote-url=${STOCK_QUOTE_URL:https://query1.finance.yahoo.com/v7/finance/quote?symbols=%s}
stock.history-url=${STOCK_HISTORY_URL:https://query1.finance.yahoo.com/v8/finance/chart/%s?interval=1d&range=1y}
yahoo.consent-url=${YAHOO_CONSENT_URL:https://fc.yahoo.com}
yahoo.crumb-url=${YAHOO_CRUMB_URL:https://query2.finance.yahoo.com/v1/test/getcrumb}
http.client.connect-timeout-seconds=${HTTP_CLIENT_CONNECT_TIMEOUT_SECONDS:10}
http.client.read-timeout-seconds=${HTTP_CLIENT_READ_TIMEOUT_SECONDS:10}
http.client.write-timeout-seconds=${HTTP_CLIENT_WRITE_TIMEOUT_SECONDS:10}
market.daily.stocks.cron=${MARKET_DAILY_STOCKS_CRON:0 0 2 * * MON-SAT}

fund.base-url=https://www.tefas.gov.tr
fund.portal-url=${FUND_PORTAL_URL:https://www.tefas.gov.tr/tr/fon-verileri}
fund.home-url=${FUND_HOME_URL:https://www.tefas.gov.tr/tr/fon-verileri}
fund.daily-cron=${FUND_DAILY_CRON:0 10 2 * * MON-SAT}
fund.request-delay-ms=${FUND_REQUEST_DELAY_MS:300}
fund.retry-delays-ms=${FUND_RETRY_DELAYS_MS:2000,5000,15000}
fund.inter-fund-backfill-delay-ms=${FUND_INTER_FUND_BACKFILL_DELAY_MS:60000}


evds.base-url=https://evds3.tcmb.gov.tr/igmevdsms-dis
evds.api-key=${EVDS_API_KEY}
evds.cron=${EVDS_CRON:0 15 2 * * MON-SAT}
macro.deposit.cron=${MACRO_DEPOSIT_CRON:0 20 2 * * MON-SAT}
macro.inflation.cron=${MACRO_INFLATION_CRON:0 25 2 * * *}
viop.url=${VIOP_URL:https://www.isyatirim.com.tr/tr-tr/analiz/Sayfalar/viop.aspx}
viop.cron=${VIOP_CRON:0 30 2 * * MON-SAT}

# Keycloak / OAuth2 Resource Server
# issuer-url: JWT içindeki 'iss' claim ile eşleşmeli (browser/frontend perspektifinden)
# internal-url: Backend'in JWK set'i çekmek için kullandığı URL (container network'ten erişilebilir olmalı)
keycloak.realm=${KEYCLOAK_REALM:finance-portal}
keycloak.issuer-url=${KEYCLOAK_ISSUER_URL:http://localhost:8080}
keycloak.internal-url=${KEYCLOAK_INTERNAL_URL:http://fp-keycloak:8080}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${keycloak.internal-url}/realms/${keycloak.realm}/protocol/openid-connect/certs
# Keycloak Admin API (service account client)
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:finance-portal-backend}
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:}
# Stock Technical Indicator Configuration
# Fiyat kapanış job'u 15:05'te, indikatör job'u 15:35'te (30 dk sonra)
stock.indicator.cron=${STOCK_INDICATOR_CRON:0 40 2 * * MON-SAT}

# Portfolio module
portfolio.valuation-cache.ttl-seconds=60
